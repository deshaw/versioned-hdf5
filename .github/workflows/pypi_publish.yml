name: Release Python Bindings to PyPI

on:
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: 💻 Checkout the repo
        uses: actions/checkout@v6
        with:
          # get correct version from setuptools_scm
          fetch-depth: 0
          fetch-tags: true

      - uses: prefix-dev/setup-pixi@v0
        with:
          pixi-version: v0.63.2
          cache: true
          environments: py314

      - name: 📦 Build the source tarball
        run: pixi r -e py314 sdist

      - name: Check source package
        run: pixi r -e py314 twine-check

      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: ./dist/*.tar.gz

  publish:
    name: Publish Python packages on PyPI
    if: (github.event_name == 'release' && startsWith(github.ref, 'refs/tags')) || (github.event_name == 'workflow_dispatch')
    needs: [build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/versioned-hdf5
    permissions:
      id-token: write
    steps:
      - name: Retrieve sdist
        uses: actions/download-artifact@v6
        with:
          merge-multiple: true
          path: dist/

      - name: print artifacts
        run: ls -l dist/

      - name: 🎉 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
