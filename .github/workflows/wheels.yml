name: Build wheels

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: true
        type: string
permissions: {}

env:
  H5PY_VERSION: "3.16.0"

jobs:
  build-wheels:
    name: "Build wheel"
    runs-on: ${{ inputs.os }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # get the non-merge commit for PRs
          fetch-tags: true # include tags to get correct version from setuptools_scm
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.12

      - name: Pin h5py version
        # h5py binary wheels ship hdf5 binaries. Updating h5py very frequently
        # breaks compatibility. The only reasonable way to support wheels is a
        # hard pin of the h5py version. Users can still use conda-forge packages
        # if they want more freedom.
        shell: bash
        run: |
          # Modifying any files checked in git will update the setuptools-scm version;
          # force setuptools-scm to return the previous version with a tag.
          pip install setuptools-scm
          TAG=$(python -m setuptools_scm)
          # No sed -i available on MacOS
          sed "s/h5py>=3.8.0/h5py==$H5PY_VERSION/" pyproject.toml > pyproject.toml.new
          mv pyproject.toml.new pyproject.toml
          git config --global user.email "bot@deshaw.com"
          git config --global user.name "Release bot"
          git commit -a -m 'Increase minimum h5py version'
          git tag -f "$TAG"

      # MacOS environment setup
      - name: Update env variables (MacOS)
        if: runner.os == 'macOS'
        run: |
          INCLUDE_PATH=$(python -c 'import sysconfig; print(sysconfig.get_path("include"))')
          # shellcheck disable=SC2086
          echo "CPATH=$INCLUDE_PATH:$CPATH" >> $GITHUB_ENV

      - name: Run cibw_before_all_macos
        if: runner.os == 'macOS'
        run: bash ./ci/cibw_before_all_macos.sh "${{ github.workspace }}"

      # Windows environment setup
      - name: choco install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: crazy-max/ghaction-chocolatey@dff3862348493b11fba2fbc49147b6d2dfe09b66 # v4
        with:
          args: install pkgconfiglite llvm

      - name: Run cibw_before_all_windows
        if: runner.os == 'Windows'
        run: bash ./ci/cibw_before_all_windows.sh "${{ github.workspace }}"
        env:
          ARCH: ${{ inputs.arch }}

      # Build the wheels
      - name: Triage the build
        run: bash ./ci/triage_build.sh "$ARCH" "${{ github.event.pull_request.head.sha || github.sha }}" "$PYTHONVERSION"
        env:
          ARCH: ${{ inputs.arch }}
          PYTHONVERSION: ${{ inputs.python-version }}

      - name: Run cibuildwheel
        uses: pypa/cibuildwheel@ee02a1537ce3071a004a6b08c41e72f0fdc42d9a # v3.4.0
        env:
          # Note that tool.cibuildwheel "skip" in pyproject.toml also limits what gets built
          CIBW_ARCHS: ${{ inputs.arch }}
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_SKIP: "*musllinux*"
          CIBW_BEFORE_BUILD: ${{ env.CIBW_BEFORE_BUILD }}
          CIBW_BUILD_FRONTEND: ${{ env.CIBW_BUILD_FRONTEND }}
          CIBW_PRERELEASE_PYTHONS: ${{ env.CIBW_PRERELEASE_PYTHONS }}
          CIBW_BEFORE_BUILD_LINUX: yum install -y zlib-devel

      # Remove spurious libraries added by auditwheels/delocate in the repair step
      - name: Remove embedded libhdf5 (Linux)
        if: runner.os == 'Linux'
        run: zip -d ./wheelhouse/*.whl 'h5py.libs/*'
      - name: Remove embedded libhdf5 (MacOS)
        if: runner.os == 'macOS'
        run: zip -d ./wheelhouse/*.whl 'h5py/*'
      - name: Remove h5py DLLs from RECORD (Linux / MacOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          cd wheelhouse
          unzip ./*.whl '*/RECORD'
          echo "Removing lines:"
          sed -n '/^h5py/p' ./*/RECORD
          # No sed -i available on MacOS
          sed '/^h5py/d' ./*/RECORD > RECORD.new
          mv -v RECORD.new ./*/RECORD
          zip ./*.whl ./*/RECORD

      - name: Upload wheels
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: wheels-${{ inputs.os }}-${{inputs.arch}}-${{ inputs.python-version }}
          path: ./wheelhouse/*.whl

  # Start again from a clean environment.
  # pip install the wheel and run a subset of the unit tests.
  # DO NOT use the 'test' step in cibuildwheel, because it runs on a manylinux image
  # which includes libhdf5.
  smoke-test:
    name: "Smoke test"
    needs: [build-wheels]
    runs-on: ${{ inputs.os }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # get the non-merge commit for PRs
          fetch-tags: true # include tags to get correct version from setuptools_scm
          persist-credentials: false

      - name: Prevent accidentally testing repository package
        run: rm -r versioned_hdf5

      - name: Retrieve wheel
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: wheels-${{ inputs.os }}-${{inputs.arch}}-${{ inputs.python-version }}
          merge-multiple: true # Don't unzip into subdirectory
          path: wheels/

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies for smoke tests
        run: pip install pytest pytest-env hypothesis packaging psutil

      # Note: this pulls in the h5py wheel from pypi, which embeds libhdf5.
      - name: Install package for smoke tests
        shell: bash
        run: pip install -v ./wheels/*.whl

      - name: Test import h5py
        run: python -c 'import h5py; print(h5py.version.info)'

      - name: Test import versioned_hdf5
        run: python -c 'import versioned_hdf5; print(versioned_hdf5.__version__)'

      - name: Print hdf5 install path
        run: |
          python utils/debug_libhdf5_so.py h5py
          python utils/debug_libhdf5_so.py versioned_hdf5

      - name: Run smoke tests
        run: pytest -m 'api and not slow'

      - name: pip uninstall
        run: pip uninstall -y versioned-hdf5

      - name: Retest h5py after uninstalling versioned-hdf5
        run: python -c 'import h5py; print(h5py.version.info)'
