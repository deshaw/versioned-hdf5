name: Build docs
on:
  pull_request:
  workflow_dispatch:
permissions: {}

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # get correct version from setuptools_scm
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: v0.72.0
          cache: true
          environments: docs

      - name: Compile, install, and print versions
        run: pixi r -e docs smoke

      - name: Build docs
        run: pixi r -e docs docs

      - name: Build docs (multiversion)
        run: pixi r -e docs docs-multiversion
